<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Splitter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #f9f5ff 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --inner-bg: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 400px; /* 모바일 최적화 폭 */
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 32px 20px;
        }

        header { text-align: center; margin-bottom: 24px; }
        header h1 { 
            font-size: 2.2rem; 
            background: linear-gradient(to right, #6366f1, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }

        /* 업로드 영역 */
        #drop-zone {
            background: #fff;
            border: 2px dashed #e2e8f0;
            border-radius: 24px;
            padding: 40px 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-icon { font-size: 32px; margin-bottom: 8px; display: block; }

        /* 설정 컨테이너 */
        .settings-container {
            background: var(--inner-bg);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 16px;
        }
        .section-title::before, .section-title::after {
            content: ""; flex: 1; height: 1px; background: #e2e8f0;
        }

        /* [수정 포인트] 가로/세로 설정 정렬 */
        .grid-wrapper {
            display: flex; /* grid 대신 flex로 유연하게 조절 */
            gap: 10px;
            margin-bottom: 12px;
        }

        .control-group {
            flex: 1; /* 1:1 비율 유지 */
            background: #ffffff;
            padding: 14px 4px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid #f1f5f9;
            min-width: 0; /* 내용물 때문에 박스가 늘어나는 것 방지 */
        }

        .control-group b {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 8px;
            white-space: nowrap;
        }

        .number-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .number-picker input {
            width: 32px;
            border: none;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            background: transparent;
            outline: none;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .btn-step {
            width: 28px;
            height: 28px;
            border: none;
            background: #f1f5f9;
            border-radius: 50%;
            font-size: 1rem;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-step:active { transform: scale(0.9); background: #e2e8f0; }

        /* 저장 품질 */
        .quality-wrapper { position: relative; }
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            appearance: none;
            font-size: 0.9rem;
            font-weight: 600;
            background: white;
            color: #475569;
        }
        .quality-wrapper::after {
            content: '▾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8;
        }

        /* 메인 버튼 */
        #splitBtn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            cursor: pointer;
        }
        #splitBtn:disabled { background: #cbd5e1; box-shadow: none; }

        #preview-container { margin-top: 32px; display: none; }
        #preview { display: grid; gap: 4px; background: #f1f5f9; padding: 6px; border-radius: 16px; }
        #preview img { width: 100%; border-radius: 4px; display: block; }

        footer { margin-top: 24px; text-align: center; font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body oncontextmenu="return false">

<div class="app-container">
    <header>
        <h1>Image Splitter</h1>
        <p>나만의 감성 피드 분할 도구</p>
    </header>
    
    <div id="drop-zone" onclick="document.getElementById('imageInput').click()">
        <span class="upload-icon">🖼️</span>
        <p id="drop-text" style="font-weight: 700; color: #64748b; font-size: 0.9rem;">사진을 불러오세요</p>
        <div id="file-info" style="font-size: 0.85rem; color: var(--primary); margin-top: 4px; font-weight: 700;"></div>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>

    <div class="settings-container">
        <div class="section-title">칸 나누기 설정</div>
        
        <div class="grid-wrapper">
            <div class="control-group">
                <b>가로 줄 수</b>
                <div class="number-picker">
                    <button class="btn-step" onclick="step('rows', -1)">−</button>
                    <input type="number" id="rows" value="3" readonly>
                    <button class="btn-step" onclick="step('rows', 1)">+</button>
                </div>
            </div>
            <div class="control-group">
                <b>세로 칸 수</b>
                <div class="number-picker">
                    <button class="btn-step" onclick="step('cols', -1)">−</button>
                    <input type="number" id="cols" value="1" readonly>
                    <button class="btn-step" onclick="step('cols', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="quality-wrapper">
            <select id="quality">
                <option value="1.0">저장 품질: 아주 높음</option>
                <option value="0.9" selected>저장 품질: 높음 (추천)</option>
                <option value="0.7">저장 품질: 보통</option>
            </select>
        </div>
    </div>

    <button id="splitBtn" onclick="splitAndDownload()">이미지 분할 후 저장하기</button>

    <div id="preview-container">
        <p style="text-align: center; font-weight: 700; margin-bottom: 8px; color: #64748b; font-size: 0.8rem;">분할 결과 미리보기</p>
        <div id="preview"></div>
    </div>

    <footer>© 2026. Image Splitter.</footer>
</div>

<script>
    let selectedFile = null;
    let currentImgElement = null;

    function step(id, val) {
        const input = document.getElementById(id);
        const nextVal = parseInt(input.value) + val;
        if (nextVal >= 1 && nextVal <= 20) {
            input.value = nextVal;
            if (selectedFile) updatePreview();
        }
    }

    const imageInput = document.getElementById('imageInput');
    imageInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            selectedFile = e.target.files[0];
            document.getElementById('file-info').innerText = selectedFile.name;
            document.getElementById('drop-text').style.display = 'none';
            updatePreview();
        }
    });

    function updatePreview() {
        const img = new Image();
        const objectUrl = URL.createObjectURL(selectedFile);
        img.src = objectUrl;
        img.onload = () => {
            currentImgElement = img;
            renderTiles(false);
            URL.revokeObjectURL(objectUrl);
        };
    }

    async function renderTiles(isDownload = false) {
        if (!currentImgElement) return;
        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const preview = document.getElementById('preview');
        const zip = isDownload ? new JSZip() : null;
        
        preview.innerHTML = '';
        preview.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        document.getElementById('preview-container').style.display = 'block';

        const tw = currentImgElement.width / cols;
        const th = currentImgElement.height / rows;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                canvas.width = tw; canvas.height = th;
                ctx.drawImage(currentImgElement, c * tw, r * th, tw, th, 0, 0, tw, th);
                const dataUrl = canvas.toDataURL('image/jpeg', parseFloat(document.getElementById('quality').value));
                
                if (!isDownload) {
                    const imgTag = document.createElement('img');
                    imgTag.src = dataUrl;
                    preview.appendChild(imgTag);
                } else {
                    zip.file(`part_${r+1}_${c+1}.jpg`, dataUrl.split(',')[1], {base64: true});
                }
            }
        }

        if (isDownload) {
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `split_images.zip`;
            link.click();
        }
    }

    async function splitAndDownload() {
        if (!selectedFile) return alert("사진을 먼저 선택해주세요!");
        const btn = document.getElementById('splitBtn');
        btn.innerText = "처리 중...";
        btn.disabled = true;
        try {
            await renderTiles(true);
        } finally {
            btn.innerText = "이미지 분할 후 저장하기";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
